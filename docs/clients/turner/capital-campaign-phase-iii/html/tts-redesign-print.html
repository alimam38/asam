<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TTS Phase III — Print</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  @page { size: 8.5in 11in; margin: 0; }
  html, body { margin:0; padding:0; background:#1b1b1b; font-family:'Cormorant Garamond', serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .display { font-family:'Cinzel', 'Cochin', serif; font-weight:600; letter-spacing:0.04em; }
  .serif   { font-family:'Cormorant Garamond', 'Cochin', serif; }
  .sans    { font-family:'Inter', system-ui, sans-serif; }
  .num     { font-feature-settings:"tnum","lnum"; }
  :root{
    --purple:#5A2D91; --purple-deep:#3a1c64; --purple-ink:#22113a;
    --gold:#C9A22B; --gold-bright:#E6C04A; --gold-deep:#8a6d18;
    --lavender:#E4AAFF; --whitecap:#FAFAFA; --paper:#f6f1e7; --ink:#1c1422;
    --rule:#d8d3c5; --soft:#efe7d6;
  }
  .page{
    width: 850px; height: 1100px; background: var(--whitecap);
    color: var(--ink); position:relative; overflow:hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.35);
    margin: 24px auto;
    page-break-after: always; break-after: page;
  }
  .page:last-child { page-break-after: auto; }
  .stripe-top{ position:absolute; top:0; left:0; right:0; height:14px; background:var(--purple); }
  .stripe-gold{ position:absolute; top:14px; left:0; right:0; height:4px; background:var(--gold); }
  .stat{ border-top: 2px solid var(--purple); border-bottom: 1px solid var(--rule); padding: 14px 0 12px; }
  .stat .n{ font-family:'Cinzel', serif; font-weight:700; font-size: 44px; color:var(--purple); line-height:1; letter-spacing:-0.01em; }
  .stat .l{ font-family:'Inter', sans-serif; text-transform:uppercase; letter-spacing:0.18em; font-size: 9.5px; color:var(--ink); margin-top:6px; }
  .stat .s{ font-family:'Cormorant Garamond', serif; font-style:italic; font-size: 12px; color:#5a4f3e; margin-top:3px; }
  table.tts{ width:100%; border-collapse:collapse; font-family:'Inter', sans-serif; font-size:11px; }
  table.tts thead th{ text-align:left; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; font-size: 9px; color: var(--purple); padding: 8px 10px; border-bottom: 1.5px solid var(--purple); }
  table.tts tbody td{ padding: 8px 10px; border-bottom:1px solid var(--rule); vertical-align:top; }
  table.tts td.num{ font-feature-settings:"tnum","lnum"; text-align:right; white-space:nowrap; }
  table.tts tfoot td{ padding:9px 10px; font-weight:700; border-top: 1.5px solid var(--purple); font-size: 11.5px; }
  .footer-strip{ position:absolute; bottom:0; left:0; right:0; padding:12px 56px; border-top:1px solid var(--rule); background:var(--whitecap); display:flex; justify-content:space-between; align-items:center; }
  .footer-strip .sans{ font-size:9.5px; }
  .section-h .kick{ font-family:'Inter', sans-serif; font-size:9.5px; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold-deep); }
  .section-h .ttl{ font-family:'Cinzel', serif; font-weight:600; font-size:22px; color:var(--purple-ink); margin-top:4px; letter-spacing:0.04em; }
  .section-h .rule{ height:2px; background:var(--purple); width:48px; margin-top:8px; }
  .cover-purple{ background: var(--purple-ink); color: var(--whitecap); }
  .photo{ background:repeating-linear-gradient(135deg, #efe7d6 0 8px, #f6f1e7 8px 16px); border:1px solid var(--rule); position:relative; overflow:hidden; }
  .photo .lbl{ position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:flex-start; padding:10px; font-family:'Inter', sans-serif; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--purple); font-weight:600; }
  .photo .lbl em{ font-style:italic; font-weight:400; text-transform:none; letter-spacing:0; color:#7a6e58; margin-left:8px; }
  .pq{ border-left: 3px solid var(--gold); padding: 6px 0 6px 18px; font-family:'Cormorant Garamond', serif; font-style:italic; line-height:1.35; color: var(--purple-ink); }
  .pq cite{ display:block; font-style:normal; font-family:'Inter', sans-serif; font-size:9.5px; letter-spacing:0.22em; text-transform:uppercase; color:var(--purple); margin-top:10px; }
  .gold-cap{ font-family:'Inter', sans-serif; font-size:10px; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold-deep); font-weight:600; }
  @media print {
    html, body { background: white !important; }
    .page { margin: 0 !important; box-shadow: none !important; page-break-after: always; break-after: page; }
    .page:last-child { page-break-after: auto; break-after: auto; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function Masthead({ size = 'sm', dark = false }){
  const big = size === 'lg', mid = size === 'md';
  const sz = big? 76 : mid? 56 : 44;
  const fSz = big? 22 : mid? 16 : 13;
  const fSz2 = big? 11 : mid? 9 : 8;
  const tone = dark ? 'var(--gold-bright)' : 'var(--purple)';
  const small = dark ? 'rgba(230,192,74,0.85)' : 'var(--gold-deep)';
  const src = dark ? 'assets/tts-white-crest.png' : 'assets/tts-full-color-crest.png';
  return (
    <div style={{display:'flex', alignItems:'center', gap: big?20:12}}>
      <img src={src} alt="" style={{width: sz, height: sz, objectFit:'contain'}}/>
      <div>
        <div className="display" style={{fontSize: fSz, color: tone, letterSpacing:'0.14em', lineHeight:1}}>TURNER</div>
        <div className="display" style={{fontSize: fSz2, color: tone, letterSpacing:'0.36em', lineHeight:1.4, marginTop: 2, fontWeight:500}}>THEOLOGICAL · SEMINARY</div>
        <div className="sans" style={{fontSize: big?9:7.5, letterSpacing:'0.28em', color: small, marginTop: 4, fontWeight:600}}>EST. 1894 &nbsp;·&nbsp; ATLANTA, GA</div>
      </div>
    </div>
  );
}
function SectionH({ kicker, title }){ return (<div className="section-h" style={{marginBottom: 12}}><div className="kick">{kicker}</div><div className="ttl">{title}</div><div className="rule"/></div>); }
function FooterStrip({ pageLabel }){ return (<div className="footer-strip"><Masthead size="sm"/><div style={{textAlign:'right'}} className="sans"><div style={{color:'var(--purple-ink)', fontWeight:600}}>702 Martin Luther King Jr. Drive SW &nbsp;·&nbsp; Atlanta, GA 30314</div><div style={{color:'var(--purple)', letterSpacing:'0.06em', marginTop:2, fontSize:8.5}}>(404) 527-0080 &nbsp;·&nbsp; turnerseminary.org &nbsp;·&nbsp; {pageLabel}</div></div></div>); }

function CaseCover(){return(<div className="page cover-purple"><div style={{position:'absolute', inset:24, border:'1px solid rgba(201,162,43,0.4)'}}/><div style={{position:'absolute', inset:30, border:'1px solid rgba(201,162,43,0.6)'}}/><div style={{position:'absolute', top:60, left:0, right:0, display:'flex', justifyContent:'center'}}><Masthead size="sm" dark/></div><div style={{position:'absolute', top:160, left:0, right:0, display:'flex', justifyContent:'center'}}><img src="assets/tts-white.png" alt="" style={{width:240, height:240, objectFit:'contain'}}/></div><div style={{position:'absolute', top:400, left:0, right:0, textAlign:'center'}}><div className="gold-cap" style={{color:'var(--gold-bright)', letterSpacing:'0.42em', fontSize:11}}>$20 Million Capital Campaign</div><div className="display" style={{fontSize:64, color:'var(--whitecap)', marginTop:30, letterSpacing:'0.02em', lineHeight:0.95}}>A Century of<br/>Preparation.</div><div className="serif" style={{fontStyle:'italic', fontSize:34, color:'var(--gold-bright)', marginTop:12}}>A Future Worth Building.</div></div><div style={{position:'absolute', top:740, left:0, right:0, display:'flex', justifyContent:'center'}}><div style={{border:'1px solid var(--gold)', padding:'12px 28px', display:'flex', flexDirection:'column', alignItems:'center', gap:4}}><div className="sans" style={{fontSize:9, letterSpacing:'0.32em', color:'var(--gold-bright)', fontWeight:600}}>PHASE III</div><div className="display" style={{fontSize:18, color:'var(--whitecap)', letterSpacing:'0.18em'}}>Talbot Hall</div><div className="serif" style={{fontStyle:'italic', fontSize:13, color:'rgba(250,250,250,0.7)'}}>Case for Support · 2026</div></div></div><div style={{position:'absolute', bottom:60, left:0, right:0, textAlign:'center'}}><div className="display" style={{fontSize:14, color:'var(--gold-bright)', letterSpacing:'0.36em'}}>#ELEV8 WITH TURNER</div></div></div>);}

function CaseMission(){return(<div className="page"><div className="stripe-top"/><div className="stripe-gold"/><div style={{padding:'56px 64px 0'}}><div className="gold-cap">Mission · One</div><div className="display" style={{fontSize:48, color:'var(--purple)', marginTop:8, lineHeight:1, letterSpacing:'-0.005em'}}>For more than a century,<br/>Turner has prepared<br/>those who serve.</div></div><div style={{padding:'30px 64px 0', display:'grid', gridTemplateColumns:'1.2fr 1fr', gap:36}}><div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:14, lineHeight:1.55, color:'#2a2233'}}><p style={{marginTop:0}}>Founded in <b>1894</b> within the African Methodist Episcopal Church, Turner Theological Seminary is the oldest historically Black graduate school of theology in the southeastern United States. For one hundred and thirty years, our graduates have stood in pulpits, hospital corridors, classrooms, and prisons — bringing the Gospel into the hardest places American life can deliver.</p><p>We are the seminary that trains pastors who will be there when the family calls at 2 a.m. We are the seminary whose alumni serve in <b>every district of the AME Church</b> and across the historic Black church. The work has not changed. The world has.</p><p><b>Phase III</b> of our capital campaign is how we meet this moment — not by becoming something we are not, but by giving our students, faculty, and ministry the modern facility, technology, and endowment that one hundred and thirty more years of service will require.</p></div><div><div className="photo" style={{aspectRatio:'3/4'}}><div className="lbl">Dr. Ammie L. Davis <em>portrait · 3:4</em></div></div><div className="pq" style={{fontSize:18, marginTop:18}}>"It's a faith walk and we walk it together."<cite>Dr. Ammie L. Davis · President &amp; CEO</cite></div></div></div><div style={{padding:'30px 64px 0', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:18}}><div className="stat"><div className="n num">130<span style={{fontSize:24, color:'var(--gold-deep)'}}>+</span></div><div className="l">Years of Service</div><div className="s">Founded 1894</div></div><div className="stat"><div className="n num">$1.9<span style={{fontSize:24, color:'var(--gold-deep)'}}>M</span></div><div className="l">Phase I &amp; II Investment</div><div className="s">To date</div></div><div className="stat"><div className="n num">+31</div><div className="l">Net New Housing Units</div><div className="s">From 43 to 74 total</div></div><div className="stat"><div className="n num">$1.28<span style={{fontSize:24, color:'var(--gold-deep)'}}>M</span></div><div className="l">Housing Revenue · FY25</div><div className="s">2× over prior year</div></div></div><FooterStrip pageLabel="Case for Support · 02"/></div>);}

function CaseTransformations(){const items=[{n:'I',t:'A New Floor for a New Era',d:'A 5th-floor addition adds 14 dorm rooms, 5 suites, and a new classroom — every bed reserved for a future minister.',amt:'$4.0M'},{n:'II',t:'The Endowment That Lasts',d:'A $2M endowment corpus secures faculty, scholarship, and operational independence for the century to come.',amt:'$2.0M'},{n:'III',t:'Systems Worth Their Mission',d:'Full HVAC and electrical replacement — quiet, modern, and reliable for the next forty years of formation.',amt:'$2.0M'},{n:'IV',t:'Sacred Space, Renewed',d:'The Courtyard, Chapel, and Elevator are restored as the center of seminary life and student welcome.',amt:'$1.5M'},{n:'V',t:'Technology That Serves Ministry',d:'Network, audio-visual, and learning systems brought to the standard our students and graduates already meet in the field.',amt:'$1.5M'}];return(<div className="page"><div className="stripe-top"/><div className="stripe-gold"/><div style={{padding:'56px 64px 0'}}><div className="gold-cap">The Plan · Two</div><div className="display" style={{fontSize:42, color:'var(--purple)', marginTop:8, lineHeight:1.02, letterSpacing:'-0.005em'}}>Five Transformations.<br/>One Sacred Building.</div><div className="serif" style={{fontSize:14, fontStyle:'italic', color:'#5a4f3e', marginTop:10, maxWidth:580}}>Phase III is one campaign expressed as five investments. Each can be named. Each is essential. Together they total <b style={{color:'var(--purple)', fontStyle:'normal'}}>$20,000,000</b>.</div></div><div style={{padding:'24px 64px 0'}}>{items.map((it,i)=>(<div key={i} style={{display:'grid', gridTemplateColumns:'56px 1fr 110px', alignItems:'baseline', gap:18, padding:'14px 0', borderBottom: i<items.length-1?'1px solid var(--rule)':'none'}}><div className="display" style={{fontSize:32, color:'var(--gold)', lineHeight:1, letterSpacing:'0.06em'}}>{it.n}</div><div><div className="display" style={{fontSize:18, color:'var(--purple-ink)', lineHeight:1.15}}>{it.t}</div><div className="serif" style={{fontSize:13, color:'#3a2f1e', lineHeight:1.45, marginTop:4}}>{it.d}</div></div><div className="display num" style={{fontSize:22, color:'var(--purple)', textAlign:'right', letterSpacing:'-0.01em'}}>{it.amt}</div></div>))}</div><div style={{position:'absolute', left:64, right:64, bottom:96, padding:'14px 18px', background:'var(--purple)', color:'var(--whitecap)', display:'flex', justifyContent:'space-between', alignItems:'center'}}><div className="gold-cap" style={{color:'var(--gold-bright)'}}>Total · Phase III Campaign</div><div className="display num" style={{fontSize:28, color:'var(--gold-bright)', letterSpacing:'-0.01em'}}>$20,000,000</div></div><FooterStrip pageLabel="Case for Support · 03"/></div>);}

function CaseLeadership(){return(<div className="page"><div className="stripe-top"/><div className="stripe-gold"/><div style={{padding:'56px 64px 0'}}><div className="gold-cap">Leadership · Three</div><div className="display" style={{fontSize:42, color:'var(--purple)', marginTop:8, lineHeight:1, letterSpacing:'-0.005em'}}>The Stewards of<br/>This Moment.</div></div><div style={{padding:'30px 64px 0', display:'grid', gridTemplateColumns:'1fr 1.3fr', gap:36}}><div><div className="photo" style={{aspectRatio:'3/4'}}><div className="lbl">Dr. Ammie L. Davis <em>portrait</em></div></div><div style={{marginTop:12}}><div className="display" style={{fontSize:18, color:'var(--purple-ink)'}}>Dr. Ammie L. Davis</div><div className="sans" style={{fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--purple)', marginTop:4}}>President &amp; CEO</div></div></div><div><div className="pq" style={{fontSize:22, lineHeight:1.3}}>"Phase III is not a renovation. It is the seminary's act of faith that the next century of ministry deserves better than the last forty years of facility. We owe our students that promise — and we owe the church that prepared us, the same."<cite>Dr. Ammie L. Davis</cite></div><div style={{marginTop:24}}><SectionH kicker="Campaign Cabinet" title="Senior Leadership"/><div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, fontFamily:"'Cormorant Garamond', serif", fontSize:13, color:'#2a2233', lineHeight:1.5}}><div><div className="sans" style={{fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--purple)', fontWeight:600}}>Honorary Chair</div><div style={{marginTop:3}}>Bishop Reginald T. Jackson<br/><i>Sixth Episcopal District</i></div></div><div><div className="sans" style={{fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--purple)', fontWeight:600}}>Campaign Chair</div><div style={{marginTop:3}}>To be named<br/><i>Major Gifts Cabinet</i></div></div><div><div className="sans" style={{fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--purple)', fontWeight:600}}>Board Chair</div><div style={{marginTop:3}}>Board of Trustees<br/><i>Turner Theological Seminary</i></div></div><div><div className="sans" style={{fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--purple)', fontWeight:600}}>Director of Advancement</div><div style={{marginTop:3}}>Office of Institutional Advancement<br/><i>(404) 527-0080</i></div></div></div></div><div style={{marginTop:24, padding:'16px 18px', borderTop:'2px solid var(--purple)', borderBottom:'1px solid var(--rule)'}}><div className="gold-cap">A Personal Invitation</div><div className="serif" style={{fontSize:13.5, lineHeight:1.5, color:'#2a2233', marginTop:6}}>President Davis welcomes the opportunity to share Phase III with you in person — at the seminary, in your home, or wherever it is most meaningful. To arrange a conversation, contact the Office of Institutional Advancement.</div></div></div></div><FooterStrip pageLabel="Case for Support · 04"/></div>);}

function GiftFront(){const tiers=[{amt:'$2,000,000',name:'Endowment Corpus',sub:'Naming opportunity at $3M',body:'Permanent endowment supporting faculty chairs, student scholarships, and operational stewardship for the century to come.'},{amt:'$1,500,000',name:'Capital Improvements',sub:'Courtyard · Chapel · Elevator',body:'Restoration of the spaces where seminary life happens — worship, gathering, accessibility, welcome.'},{amt:'$1,500,000',name:'Technology Infrastructure',sub:'Naming opportunity available',body:'A complete refresh of network, classroom A/V, and learning systems for the way ministry is now taught and practiced.'}];return(<div className="page"><div className="stripe-top"/><div className="stripe-gold"/><div style={{padding:'52px 56px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}><Masthead size="md"/><div style={{textAlign:'right'}}><div className="gold-cap" style={{fontSize:9}}>Gift Opportunity Summary</div><div className="display" style={{fontSize:14, color:'var(--purple-ink)', marginTop:3, letterSpacing:'0.16em'}}>Phase III · Talbot Hall</div><div className="sans" style={{fontSize:9, color:'#7a6e58', marginTop:2}}>2026 Edition · Front</div></div></div><div style={{padding:'30px 56px 0'}}><div className="display" style={{fontSize:54, color:'var(--purple)', lineHeight:0.96, letterSpacing:'-0.005em'}}>Three Priority<br/>Opportunities.</div><div className="serif" style={{fontStyle:'italic', fontSize:20, color:'var(--gold-deep)', marginTop:10}}>Each one names a future. Each one is essential.</div></div><div style={{padding:'28px 56px 0'}}>{tiers.map((t,i)=>(<div key={i} style={{display:'grid', gridTemplateColumns:'180px 1fr', gap:20, alignItems:'stretch', borderTop: i===0?'2px solid var(--purple)':'1px solid var(--rule)', padding:'18px 0'}}><div><div className="display num" style={{fontSize:28, color:'var(--purple)', letterSpacing:'-0.01em', lineHeight:1}}>{t.amt}</div><div className="sans" style={{fontSize:9, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--gold-deep)', marginTop:8, fontWeight:600}}>{t.sub}</div></div><div><div className="display" style={{fontSize:22, color:'var(--purple-ink)', letterSpacing:'0.02em'}}>{t.name}</div><div className="serif" style={{fontSize:13.5, lineHeight:1.5, color:'#2a2233', marginTop:6}}>{t.body}</div></div></div>))}</div><div style={{position:'absolute', left:56, right:56, bottom:96, padding:'16px 20px', background:'var(--purple)', color:'var(--whitecap)', display:'flex', justifyContent:'space-between', alignItems:'center'}}><div><div className="gold-cap" style={{color:'var(--gold-bright)'}}>To Discuss Your Gift</div><div className="serif" style={{fontStyle:'italic', fontSize:15, marginTop:4}}>Office of Institutional Advancement · (404) 527-0080</div></div><div className="display" style={{fontSize:14, color:'var(--gold-bright)', letterSpacing:'0.32em'}}>#ELEV8</div></div><FooterStrip pageLabel="Gift Opportunity · Front"/></div>);}

function GiftBack(){const rows=[['Endowment Corpus Donation','Endowment','$2,000,000','at $3M'],['Technology Infrastructure Upgrade','Technology','$1,500,000','Yes'],['Capital Improvements (Courtyard, Chapel, Elevator)','Facilities','$1,500,000','Yes'],['5th Floor Addition (14 dorms, 5 suites, 1 classroom)','Construction','$4,000,000','Per space'],['HVAC & Electrical Systems Replacement','Systems','$2,000,000','—'],['Library & Learning Resource Renewal','Academic','$1,500,000','Yes'],['Student Scholarship Fund','Student Aid','$2,500,000','Yes'],['Faculty Chair Endowment','Endowment','$2,000,000','Yes'],['Campus Beautification & Grounds','Facilities','$1,000,000','Yes'],['Capital Campaign Reserve','Operations','$2,000,000','—']];return(<div className="page"><div className="stripe-top"/><div className="stripe-gold"/><div style={{padding:'52px 56px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}><Masthead size="sm"/><div style={{textAlign:'right'}}><div className="gold-cap" style={{fontSize:9}}>The Complete Plan</div><div className="display" style={{fontSize:14, color:'var(--purple-ink)', marginTop:3, letterSpacing:'0.16em'}}>$20,000,000</div><div className="sans" style={{fontSize:9, color:'#7a6e58', marginTop:2}}>2026 Edition · Back</div></div></div><div style={{padding:'24px 56px 0'}}><SectionH kicker="04 · Investment Roster" title="Where the $20M Goes"/><table className="tts"><thead><tr><th>Investment Priority</th><th>Category</th><th style={{textAlign:'right'}}>Amount</th><th style={{textAlign:'right'}}>Naming</th></tr></thead><tbody>{rows.map((r,i)=>(<tr key={i}><td>{r[0]}</td><td>{r[1]}</td><td className="num">{r[2]}</td><td className="num" style={{color: r[3]!=='—' ? 'var(--gold-deep)' : '#7a6e58', fontWeight: r[3]!=='—' ? 600 : 400}}>{r[3]}</td></tr>))}</tbody><tfoot><tr><td colSpan="2" style={{textTransform:'uppercase', letterSpacing:'0.18em', fontSize:10, color:'var(--purple)'}}>Total Campaign Investment</td><td className="num" style={{color:'var(--purple)', fontSize:13}}>$20,000,000</td><td/></tr></tfoot></table></div><div style={{position:'absolute', left:56, right:56, bottom:90, display:'grid', gridTemplateColumns:'1.2fr 1fr', gap:24, alignItems:'flex-start'}}><div className="pq" style={{fontSize:18}}>"Naming a space at Turner is not a transaction. It is a generation's signature on the next."<cite>Dr. Ammie L. Davis</cite></div><div style={{padding:'14px 16px', border:'1px solid var(--purple)'}}><div className="gold-cap">Next Step</div><div className="serif" style={{fontSize:13, lineHeight:1.45, color:'#2a2233', marginTop:6}}>To explore a naming opportunity or pledge schedule, contact the Office of Institutional Advancement at (404) 527-0080 or advancement@turnerseminary.org.</div></div></div><FooterStrip pageLabel="Gift Opportunity · Back"/></div>);}
