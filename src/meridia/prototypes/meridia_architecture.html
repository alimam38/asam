<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridia — System Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #06080e;
  --chamber: #0b0e17;
  --panel: #0f1320;
  --rail: #141824;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --gold-dim: rgba(201,168,76,0.35);
  --cream: #f0e8d5;
  --mist: rgba(240,232,213,0.55);
  --border: rgba(180,155,90,0.12);
  --border-hi: rgba(180,155,90,0.3);
  --green: #4a9e7a;
  --blue: #4a7eb8;
  --amber: #c8874a;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:var(--deep); color:var(--cream); font-family:'DM Sans',sans-serif; font-weight:300; overflow:hidden; }

/* HEADER */
#hdr {
  height:52px;
  background:var(--chamber);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px;
  flex-shrink:0;
}
.hdr-left { display:flex; align-items:center; gap:16px; }
.hdr-crest {
  width:22px; height:22px;
  border:1px solid var(--gold-dim);
  transform:rotate(45deg);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.hdr-crest-inner { width:8px; height:8px; background:var(--gold); opacity:0.35; }
.hdr-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.35em; color:var(--gold); text-transform:uppercase; }
.hdr-sub { font-size:9px; letter-spacing:.2em; color:var(--mist); text-transform:uppercase; }
.hdr-right { display:flex; align-items:center; gap:24px; }
.hdr-tag {
  font-size:8.5px; letter-spacing:.2em; text-transform:uppercase;
  padding:3px 10px; border:1px solid var(--border-hi); color:var(--gold-dim);
}
.hdr-instruction { font-size:9px; letter-spacing:.12em; color:rgba(240,232,213,0.25); text-transform:uppercase; }

/* LAYOUT */
#layout { display:grid; grid-template-columns:1fr 340px; height:calc(100vh - 52px); gap:1px; background:var(--border); }

/* CANVAS AREA */
#canvas-wrap {
  background:var(--deep);
  position:relative;
  overflow:hidden;
}

/* GRID TEXTURE */
#canvas-wrap::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(180,155,90,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,155,90,0.04) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

#arch-canvas {
  width:100%; height:100%;
  display:block;
}

/* DETAIL PANEL */
#detail {
  background:var(--chamber);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.detail-header {
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.detail-title { font-size:8.5px; letter-spacing:.28em; color:var(--gold); text-transform:uppercase; }
.detail-body {
  padding:18px 20px;
  flex:1; overflow-y:auto;
}
.detail-body::-webkit-scrollbar { width:3px; }
.detail-body::-webkit-scrollbar-thumb { background:var(--border-hi); }

.detail-name {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; font-weight:300;
  color:var(--cream);
  margin-bottom:6px;
}
.detail-type {
  font-size:8.5px; letter-spacing:.22em; text-transform:uppercase;
  margin-bottom:16px;
}
.detail-desc {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:14px; line-height:1.65;
  color:var(--mist);
  margin-bottom:18px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.detail-section { margin-bottom:16px; }
.detail-section-title {
  font-size:8px; letter-spacing:.25em; text-transform:uppercase;
  color:var(--gold-dim); margin-bottom:8px;
}
.detail-item {
  font-size:10.5px; letter-spacing:.04em;
  color:rgba(240,232,213,0.6);
  padding:5px 0; border-bottom:1px solid rgba(180,155,90,0.07);
  line-height:1.5;
}
.detail-item:last-child { border-bottom:none; }
.detail-code {
  font-family:var(--mono);
  font-size:9.5px; color:var(--gold-light);
  background:rgba(201,168,76,0.06);
  border:1px solid rgba(201,168,76,0.1);
  padding:8px 12px;
  margin:6px 0;
  display:block;
  line-height:1.6;
}
.detail-badge {
  display:inline-block;
  font-size:8px; letter-spacing:.15em; text-transform:uppercase;
  padding:2px 8px; border-radius:1px;
  margin:2px 3px 2px 0;
}
.badge-green { background:rgba(74,158,122,0.12); color:var(--green); border:1px solid rgba(74,158,122,0.25); }
.badge-blue { background:rgba(74,126,184,0.12); color:var(--blue); border:1px solid rgba(74,126,184,0.25); }
.badge-amber { background:rgba(200,135,74,0.12); color:var(--amber); border:1px solid rgba(200,135,74,0.25); }
.badge-gold { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid rgba(201,168,76,0.22); }

.detail-placeholder {
  text-align:center;
  padding:60px 20px;
}
.detail-placeholder-icon {
  width:40px; height:40px;
  border:1px solid var(--border-hi);
  transform:rotate(45deg);
  margin:0 auto 20px;
  display:flex; align-items:center; justify-content:center;
}
.detail-placeholder-icon-inner {
  width:14px; height:14px;
  background:var(--gold-dim);
  transform:rotate(-45deg);
}
.detail-placeholder-text {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:15px;
  color:rgba(240,232,213,0.3);
  line-height:1.6;
}

/* LAYER LABELS */
.layer-labels {
  position:absolute;
  left:0; top:0; bottom:0;
  width:32px;
  display:flex; flex-direction:column;
  pointer-events:none;
}

/* TOOLTIP */
#tooltip {
  position:fixed;
  background:var(--rail);
  border:1px solid var(--border-hi);
  padding:8px 12px;
  font-size:9.5px; letter-spacing:.08em;
  color:var(--cream);
  pointer-events:none;
  display:none;
  z-index:50;
  max-width:200px;
}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-left">
    <div class="hdr-crest"><div class="hdr-crest-inner"></div></div>
    <div>

  </div>

<div id="tooltip"></div>

  // SECURITY LAYER (horizontal)
  security: {
    id:'security', layer:'security', label:'Security', sublabel:'Cross-Layer',
    color: 'rgba(180,155,90,0.7)',
    detail: {
      name:'Security Architecture', type:'Cross-Layer · All Tiers',
      desc:'Security is not a layer on top of the system. It runs through every layer simultaneously. Every data element in motion and at rest is protected. Every API call is authenticated. Every sensitive insight is gated by governance approval before release.',
      sections:[
        { title:'Encryption', items:['At rest: AES-256 · Btrfs on NAS','In transit: TLS 1.3 minimum · no fallback to 1.2','Database connections: SSL enforced on PostgreSQL','API responses: HTTPS only — HTTP requests rejected'] },
        { title:'Authentication', items:['OAuth 2.0 PKCE flow — no implicit grants','JWT tokens — short-lived (15 min access, 7 day refresh)','API key rotation — 90-day mandatory cycle','2FA enforced on NAS admin access'] },
        { title:'Data Handling', items:['PII fields encrypted at column level in PostgreSQL','Sensitive insights locked until governance approval — Integra enforces','Audit log: every data access event recorded immutably','No PII in URL parameters or query strings','Data residency: US-only — no cross-border transfer in Phase 1'] },
        { title:'Institutional Alignment', items:['SOC 2 Type II roadmap — Phase 3','PCI DSS scoping — payment rail integration phase','GLBA safeguards rule compliance — financial data handling','CCPA / state privacy law compliance built into data model'] },
      ],
      badges:['badge-green:AES-256','badge-green:TLS 1.3','badge-blue:OAuth 2.0 PKCE','badge-amber:SOC 2 Roadmap']
    }
  }
};

// ── LAYOUT CALCULATION ──
function calcLayout() {
  W = wrap.offsetWidth;
  H = wrap.offsetHeight;
  canvas.width = W;
  canvas.height = H;

  const pad = { l:48, r:24, t:24, b:24 };
  const usableW = W - pad.l - pad.r;
  const usableH = H - pad.t - pad.b;

  const layers = 5;
  const layerH = usableH / layers;

  // Layer Y centers
  const ly = i => pad.t + layerH * i + layerH / 2;

  // Presentation (layer 0) — 3 nodes
  place('index8',       pad.l + usableW * 0.15, ly(0), 110, 36);
  place('adaptive',     pad.l + usableW * 0.50, ly(0), 110, 36);
  place('vantage',      pad.l + usableW * 0.85, ly(0), 110, 36);

  // Intelligence (layer 1) — 4 nodes
  place('positionEngine',  pad.l + usableW * 0.12, ly(1), 108, 36);
  place('causalModel',     pad.l + usableW * 0.38, ly(1), 108, 36);
  place('trustIndex',      pad.l + usableW * 0.62, ly(1), 108, 36);
  place('reportGenerator', pad.l + usableW * 0.88, ly(1), 108, 36);

  // Storage (layer 2) — 1 node centered
  place('postgres', pad.l + usableW * 0.50, ly(2), 130, 36);

  // Feed Layer (layer 3) — 1 node centered
  place('feedLayer', pad.l + usableW * 0.50, ly(3), 130, 36);

  // Sources (layer 4) — 6 nodes
  const srcCount = 6;
  const srcNames = ['ffiec','hmda','fred','census','fdic','cfpb'];
  srcNames.forEach((n,i) => {
    place(n, pad.l + usableW * (i + 0.5) / srcCount, ly(4), 72, 30);
  });

  // Security — virtual node at left
  place('security', pad.l - 14, H/2, 0, 0);
}

function place(id, x, y, w, h) {
  const n = NODE_DATA[id];
  n.x = x; n.y = y; n.w = w; n.h = h;
  NODES.push(n);
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  drawLayerBands();
  drawConnections();
  drawSecurityRail();
  NODES.forEach(n => { if(n.id !== 'security') drawNode(n); });
  drawLayerLabels();
}

function drawLayerBands() {
  const pad = { l:48, t:24, b:24 };
  const usableH = H - pad.t - pad.b;
  const layerH = usableH / 5;
  const labels = ['Presentation', 'Intelligence Engine', 'Data Store', 'Feed Pipeline', 'External Sources'];
  const colors = [C.blueDim, C.goldBg, C.greenDim, C.amberDim, 'rgba(240,232,213,0.02)'];

  labels.forEach((lbl, i) => {
    const y = pad.t + layerH * i;
    ctx.fillStyle = colors[i];
    ctx.fillRect(pad.l, y, W - pad.l - 24, layerH);
    // right border
    ctx.strokeStyle = 'rgba(180,155,90,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, y + layerH);
    ctx.lineTo(W - 24, y + layerH);
    ctx.stroke();
  });
}

function drawLayerLabels() {
  const pad = { l:48, t:24, b:24 };
  const usableH = H - pad.t - pad.b;
  const layerH = usableH / 5;
  const labels = ['Presentation','Intelligence','Storage','Pipeline','Sources'];
  const colors = [C.blue, C.gold, C.green, C.amber, 'rgba(240,232,213,0.3)'];

  ctx.save();
  labels.forEach((lbl, i) => {
    const y = pad.t + layerH * i + layerH / 2;
    ctx.font = '8px DM Sans, sans-serif';
    ctx.fillStyle = colors[i];
    ctx.globalAlpha = 0.7;
    ctx.save();
    ctx.translate(20, y);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(lbl.toUpperCase(), -lbl.length * 2.5, 0);
    ctx.restore();
  });
  ctx.restore();
}

function drawConnections() {
  // Presentation → Intelligence
  const presNodes = ['index8','adaptive','vantage'];
  const intNodes = ['positionEngine','causalModel','trustIndex','reportGenerator'];
  presNodes.forEach(p => {
    intNodes.forEach(q => {
      if (
        (p==='index8' && (q==='positionEngine'||q==='reportGenerator')) ||
        (p==='adaptive' && (q==='positionEngine'||q==='trustIndex')) ||
        (p==='vantage' && (q==='causalModel'||q==='reportGenerator'))
      ) {
        drawWire(NODE_DATA[p], NODE_DATA[q], C.blueDim, false);
      }
    });
  });

  // Intelligence → Storage
  intNodes.forEach(n => drawWire(NODE_DATA[n], NODE_DATA['postgres'], 'rgba(201,168,76,0.15)', false));

  // Storage → FeedLayer
  drawWire(NODE_DATA['postgres'], NODE_DATA['feedLayer'], 'rgba(74,158,122,0.2)', true);

  // FeedLayer → Sources
  ['ffiec','hmda','fred','census','fdic','cfpb'].forEach(s => {
    drawWire(NODE_DATA['feedLayer'], NODE_DATA[s], 'rgba(200,135,74,0.2)', false);
  });
}

function drawWire(a, b, color, dashed) {
  if(!a.x||!b.x) return;
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  if(dashed) ctx.setLineDash([3,5]); else ctx.setLineDash([]);

  const x1 = a.x, y1 = a.y + (a.h||0)/2;
  const x2 = b.x, y2 = b.y - (b.h||0)/2;
  const cp = (y1 + y2) / 2;

  ctx.moveTo(x1, y1);
  ctx.bezierCurveTo(x1, cp, x2, cp, x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);

  // small arrow at destination
  const angle = Math.atan2(y2 - cp, x2 - x1 * 0.01);
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 4 * Math.cos(angle - 0.4), y2 - 4 * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - 4 * Math.cos(angle + 0.4), y2 - 4 * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function drawSecurityRail() {
  // Vertical gold rail on left indicating security runs through all layers
  const x = 44;
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(201,168,76,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  ctx.moveTo(x, 24);
  ctx.lineTo(x, H - 24);
  ctx.stroke();
  ctx.setLineDash([]);

  // Lock icon
  const ly = H/2;
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(201,168,76,0.5)';
  ctx.lineWidth = 1;
  ctx.rect(x - 7, ly - 5, 14, 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, ly - 5, 4, Math.PI, 0, false);
  ctx.stroke();

  // label
  ctx.save();
  ctx.translate(12, H/2);
  ctx.rotate(-Math.PI/2);
  ctx.font = '7.5px DM Sans, sans-serif';
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.fillText('SECURITY · AES-256 · TLS 1.3 · OAUTH 2.0', -60, 0);
  ctx.restore();
}

function drawNode(n) {
  if(!n.x) return;
  const { x, y, w, h, color, label, sublabel } = n;
  const isHov = hovered === n.id;
  const isSel = selected === n.id;

  const bx = x - w/2, by = y - h/2;

  // glow
  if(isHov || isSel) {
    ctx.shadowColor = color;
    ctx.shadowBlur = isSel ? 14 : 8;
  }

  // fill
  ctx.fillStyle = isSel ? `${color}18` : isHov ? `${color}10` : `${color}08`;
  ctx.strokeStyle = isSel ? color : isHov ? color : `${color}55`;
  ctx.lineWidth = isSel ? 1.5 : 1;
  ctx.beginPath();
  ctx.rect(bx, by, w, h);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  // label
  ctx.font = isSel ? '600 9.5px DM Sans, sans-serif' : '400 9.5px DM Sans, sans-serif';
  ctx.fillStyle = isSel ? C.cream : isHov ? C.cream : 'rgba(240,232,213,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText(label.toUpperCase(), x, y - 1);

  // sublabel
  ctx.font = '300 8px DM Sans, sans-serif';
  ctx.fillStyle = `${color}AA`;
  ctx.fillText(sublabel, x, y + 9);

  ctx.textAlign = 'left';
}

// ── INTERACTION ──
function getNode(mx, my) {
  for(const n of NODES) {
    if(!n.x || !n.w) continue;
    if(mx >= n.x - n.w/2 && mx <= n.x + n.w/2 &&
       my >= n.y - n.h/2 && my <= n.y + n.h/2) return n;
  }
  // check security rail
  if(mx < 48) return NODE_DATA['security'];
  return null;
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const n = getNode(mx, my);
  hovered = n ? n.id : null;
  canvas.style.cursor = n ? 'pointer' : 'default';

  if(n) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 24) + 'px';
    tooltip.textContent = n.label + ' — click to inspect';
  } else {
    tooltip.style.display = 'none';
  }
  draw();
});

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const n = getNode(e.clientX - r.left, e.clientY - r.top);
  if(n) {
    selected = n.id;
    renderDetail(n);
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  hovered = null;
  tooltip.style.display = 'none';
  draw();
});

function renderDetail(n) {
  const d = n.detail;
  if(!d) return;
  const body = document.getElementById('detail-body');

  let badgeHTML = '';
  if(d.badges) {
    d.badges.forEach(b => {
      const [cls, lbl] = b.split(':');
      badgeHTML += `<span class="detail-badge ${cls}">${lbl}</span>`;
    });
  }

  let sectionsHTML = '';
  if(d.sections) {
    d.sections.forEach(s => {
      sectionsHTML += `<div class="detail-section">
        <div class="detail-section-title">${s.title}</div>
        ${s.items.map(i => `<div class="detail-item">${i}</div>`).join('')}
      </div>`;
    });
  }

  let codeHTML = '';
  if(d.code) {
    codeHTML = `<div class="detail-section">
      <div class="detail-section-title">Example</div>
      <code class="detail-code">${d.code.replace(/\n/g,'<br>').replace(/ /g,'&nbsp;')}</code>
    </div>`;
  }

  body.innerHTML = `
    <div class="detail-name">${d.name}</div>
    <div class="detail-type" style="color:${n.color}">${d.type}</div>
    <div class="detail-desc">${d.desc}</div>
    <div style="margin-bottom:14px">${badgeHTML}</div>
    ${sectionsHTML}
    ${codeHTML}
  `;
}

// ── RESIZE ──
window.addEventListener('resize', () => {
  NODES.length = 0;
  calcLayout();
  draw();
});

// ── INIT ──
calcLayout();
draw();
</script>
</body>
</html>
